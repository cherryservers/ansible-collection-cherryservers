name: sanity-tests

on:
  [push, pull_request]

permissions:
  contents: read

jobs:
  sanity:
    timeout-minutes: 30
    name: Sanity (${{ matrix.versions.ansible }})
    strategy:
      fail-fast: false
      matrix:
        versions:
          - ansible: stable-2.18
          - ansible: stable-2.19
          - ansible: stable-2.20
          - ansible: devel
    runs-on: ubuntu-latest
    steps:
      - name: Do sanity tests
        uses: ansible-community/ansible-test-gh-action@d3a8ec7a59694e25e210fcd44738910149537f0e # v1.17.0
        with:
          ansible-core-version: ${{ matrix.versions.ansible }}
          testing-type: sanity
