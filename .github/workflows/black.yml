name: lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: psf/black@d2490e24dad33b8f68c77602ee29160de0fea24b # v26.5.0
        with:
          version: "== 26.3.1"
        