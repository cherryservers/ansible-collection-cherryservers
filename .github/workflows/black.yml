name: lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: psf/black@d2490e24dad33b8f68c77602ee29160de0fea24b # v26.5.0
        with:
          version: "== 26.3.1"
        